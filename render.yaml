services:
  - type: web
    name: shikshaflow-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODELS
        value: models/gemini-2.5-flash,models/gemini-2.5-flash-lite,models/gemini-2.0-flash,models/gemini-2.0-flash-lite,models/gemini-pro-latest
      - key: GENERATE_VIDEO
        value: "false"
      - key: MAX_VIDEO_SLIDES
        value: "4"
      - key: MAX_SLIDE_SECONDS
        value: "8"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: shikshaflow
      - key: JWT_SECRET_KEY
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
